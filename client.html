<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程進度報告｜客戶檢視</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--bg2:#fff;--bg3:#f0f2f5;--bg4:#e4e8ef;
  --border:#dde1e8;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
  --text:#1a1f2e;--text2:#5a6175;--text3:#9399a8;
  --blue:#2563eb;--blue-lt:#eff4ff;--blue-md:#dbeafe;
  --green:#16a34a;--green-md:#dcfce7;
  --yellow:#d97706;--yellow-md:#fef3c7;
  --red:#dc2626;--red-lt:#fff5f5;--red-md:#fee2e2;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

#loading{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spinner{width:40px;height:40px;border:3px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo h1{font-size:16px;font-weight:700;}
.logo p{font-size:11px;color:var(--text3);}
.hd-right{display:flex;align-items:center;gap:10px;}
.client-badge{background:var(--green-md);border:1px solid #86efac;border-radius:20px;padding:4px 14px;font-size:12px;color:var(--green);font-weight:700;}
.readonly-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text3);}
.dl-btn{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;box-shadow:0 2px 8px #2563eb30;transition:all .15s;}
.dl-btn:hover{background:#1d53d4;transform:translateY(-1px);}

.main{max-width:1200px;margin:0 auto;padding:24px;display:flex;flex-direction:column;gap:20px;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.stat-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.1;}
.s-total .stat-icon{background:var(--blue-lt);}.s-total .stat-val{color:var(--blue);}
.s-done  .stat-icon{background:var(--green-md);}.s-done  .stat-val{color:var(--green);}
.s-doing .stat-icon{background:var(--yellow-md);}.s-doing .stat-val{color:var(--yellow);}
.s-pend  .stat-icon{background:var(--red-md);}.s-pend  .stat-val{color:var(--red);}

/* Progress card */
.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
.big-pct{font-size:54px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--blue);flex-shrink:0;line-height:1;}
.big-pct em{font-size:22px;font-weight:400;color:var(--text3);font-style:normal;}
.cat-bars{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px;}
.cat-row{display:flex;align-items:center;gap:10px;}
.cat-lbl{font-size:12px;color:var(--text2);width:128px;flex-shrink:0;font-weight:500;}
.bar-track{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.cat-pct-n{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;width:30px;text-align:right;}

/* Gantt */
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.section-hd{padding:16px 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.deadline-chip{background:var(--red-lt);border:1px solid #fca5a5;border-radius:20px;padding:3px 12px;font-size:12px;color:var(--red);font-weight:700;}

/* Gantt */
.gantt-scroll{overflow-x:auto;}
.gantt-scroll::-webkit-scrollbar{height:6px;}
.gantt-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.g-tbl{border-collapse:collapse;min-width:700px;width:100%;}
.g-tbl th{background:var(--bg3);font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;padding:8px 12px;white-space:nowrap;border-bottom:1px solid var(--border);text-align:left;}
.g-tbl td{padding:6px 10px;border-bottom:1px solid var(--bg3);vertical-align:middle;}
.g-tbl tr:hover td{background:var(--bg3);}
.g-name{font-size:12px;font-weight:600;max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-cat{font-size:10px;color:var(--text3);}
.g-mhd{display:flex;height:26px;background:var(--bg3);border-bottom:1px solid var(--border);}
.g-mc{flex:1;text-align:center;font-size:10px;color:var(--text3);font-weight:700;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);}
.g-row{position:relative;min-width:460px;height:28px;}
.g-bg{position:absolute;inset:0;display:flex;}
.g-bgc{flex:1;border-right:1px solid var(--bg4);}
.g-bar{position:absolute;height:16px;top:50%;transform:translateY(-50%);border-radius:5px;overflow:hidden;min-width:4px;}
.g-bar-i{height:100%;border-radius:5px;}
.today-ln{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:10;opacity:.55;}

/* Table */
table{width:100%;border-collapse:collapse;}
thead th{background:var(--bg3);padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--bg3);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:10px 14px;font-size:13px;vertical-align:middle;}
.td-m{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.bd{width:5px;height:5px;border-radius:50%;background:currentColor;}
.b-done{background:var(--green-md);color:var(--green);}
.b-doing{background:var(--yellow-md);color:var(--yellow);}
.b-pend{background:var(--red-md);color:var(--red);}
.pbar{display:flex;align-items:center;gap:8px;min-width:100px;}
.pbar-t{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.pbar-f{height:100%;border-radius:3px;}
.pbar-n{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3);width:28px;}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}

/* View toggle */
.view-toggle{display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;font-family:'Noto Sans TC',sans-serif;}
.view-btn:hover{background:var(--bg2);}
.view-btn.active{background:var(--bg2);color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.vsec{display:none;}.vsec.active{display:block;}

/* Pie */
.pie-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;}
.pie-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.pie-title{font-size:13px;font-weight:700;align-self:flex-start;}
.pie-legend{display:flex;flex-direction:column;gap:6px;width:100%;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-lbl{flex:1;}
.legend-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}

.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.footer-note{text-align:center;font-size:12px;color:var(--text3);padding:16px;}

@media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr}.pie-grid{grid-template-columns:1fr}.prog-card{flex-direction:column}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>載入工程進度中…</p></div>

<header>
  <div class="logo">
    <div class="logo-icon">🏗</div>
    <div><h1 id="headerTitle">工程進度報告</h1><p id="headerSub">客戶檢視專區</p></div>
  </div>
  <div class="hd-right">
    <span class="client-badge">👤 客戶檢視</span>
    <span class="readonly-badge">👁 唯讀</span>
    <button class="dl-btn" onclick="downloadReport()">⬇ 下載進度報告</button>
  </div>
</header>

<div class="main">
  <div id="errorMsg" style="display:none;background:var(--red-lt);border:1px solid #fca5a5;border-radius:12px;padding:16px 20px;color:var(--red);font-weight:600;text-align:center;"></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card s-total"><div class="stat-icon">📋</div><div><div class="stat-lbl">總任務數</div><div class="stat-val" id="s-total">0</div></div></div>
    <div class="stat-card s-done"> <div class="stat-icon">✅</div><div><div class="stat-lbl">已完成</div><div class="stat-val" id="s-done">0</div></div></div>
    <div class="stat-card s-doing"><div class="stat-icon">⚙️</div><div><div class="stat-lbl">進行中</div><div class="stat-val" id="s-doing">0</div></div></div>
    <div class="stat-card s-pend"> <div class="stat-icon">⏳</div><div><div class="stat-lbl">未開始</div><div class="stat-val" id="s-pend">0</div></div></div>
  </div>

  <!-- Progress -->
  <div class="prog-card">
    <div class="big-pct" id="bigPct">0<em>%</em></div>
    <div class="cat-bars" id="catBars"></div>
  </div>

  <!-- Section with toggle -->
  <div class="section-card">
    <div class="section-hd">
      <div style="display:flex;align-items:center;gap:12px;">
        <span>📊 工程進度明細</span>
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('table')">列表</button>
          <button class="view-btn" onclick="setView('gantt')">甘特圖</button>
          <button class="view-btn" onclick="setView('pie')">圖表</button>
        </div>
      </div>
      <span class="deadline-chip" id="deadlineChip">⚑ 期限</span>
    </div>

    <!-- Table View -->
    <div id="view-table" class="vsec active">
      <table>
        <thead><tr><th>類別</th><th>任務名稱</th><th>協作人員</th><th>開始日期</th><th>完成日期</th><th>預估(日)</th><th>狀態</th><th>完成進度</th></tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>

    <!-- Gantt View -->
    <div id="view-gantt" class="vsec">
      <div class="gantt-scroll" id="ganttWrap"></div>
    </div>

    <!-- Pie View -->
    <div id="view-pie" class="vsec">
      <div class="pie-grid">
        <div class="pie-card"><div class="pie-title">依狀態分佈</div><canvas id="pieStatus" width="220" height="220"></canvas><div class="pie-legend" id="legendStatus"></div></div>
        <div class="pie-card"><div class="pie-title">依類別分佈</div><canvas id="pieCat" width="220" height="220"></canvas><div class="pie-legend" id="legendCat"></div></div>
        <div class="pie-card"><div class="pie-title">各類別完成率</div><canvas id="pieProgress" width="220" height="220"></canvas><div class="pie-legend" id="legendProgress"></div></div>
      </div>
    </div>
  </div>

  <div class="footer-note"><span class="sync-dot"></span>即時同步中・資料由管理者更新・最後更新：<span id="lastUpdate">—</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVI40syAU_DrKpHK8VinCTJjSNNQ577_Y",
  authDomain: "lian-cai.firebaseapp.com",
  projectId: "lian-cai",
  storageBucket: "lian-cai.firebasestorage.app",
  messagingSenderId: "85226153774",
  appId: "1:85226153774:web:5db8f25cfee2536817bcbf"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const CAT_COLORS = {
  '水電工程':'#2563eb','冷凍藏庫':'#0891b2','設備':'#7c3aed','隔間':'#e05656',
  '室內空調':'#0284c7','工廠申請登記':'#16a34a','人員訓練 軟體建置':'#c026d3','其他':'#64748b',
};
function catColor(c){ return CAT_COLORS[c]||'#64748b'; }
function pColor(p){ return p>=100?'var(--green)':p>=50?'var(--blue)':p>0?'var(--yellow)':'#e2e8f0'; }
function bdg(s){
  if(s==='已完成') return `<span class="badge b-done"><span class="bd"></span>${s}</span>`;
  if(s==='進行中') return `<span class="badge b-doing"><span class="bd"></span>${s}</span>`;
  return `<span class="badge b-pend"><span class="bd"></span>${s}</span>`;
}

// URL 參數
const params = new URLSearchParams(window.location.search);
const projId = params.get('project') || 'proj-liancai';

let currentData = null;

// 即時監聽
onSnapshot(doc(db,'projects',projId), snap => {
  document.getElementById('loading').style.display='none';
  if (!snap.exists()) {
    document.getElementById('errorMsg').style.display='block';
    document.getElementById('errorMsg').textContent='找不到此專案資料，請聯絡管理者。';
    return;
  }
  const p = snap.data();
  currentData = p;
  document.getElementById('headerTitle').textContent = p.name||'工程進度報告';
  document.getElementById('headerSub').textContent   = p.desc||'客戶檢視專區';
  document.getElementById('deadlineChip').textContent = p.deadline?`⚑ 期限 ${p.deadline}`:'';
  document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-TW');
  renderAll(p);
}, err => {
  document.getElementById('loading').style.display='none';
  document.getElementById('errorMsg').style.display='block';
  document.getElementById('errorMsg').textContent='無法載入資料，請稍後再試。';
});

function renderAll(p) {
  const tasks = Object.values(p.tasks||{});
  // Stats
  document.getElementById('s-total').textContent = tasks.length;
  document.getElementById('s-done').textContent  = tasks.filter(t=>t.status==='已完成').length;
  document.getElementById('s-doing').textContent = tasks.filter(t=>t.status==='進行中').length;
  document.getElementById('s-pend').textContent  = tasks.filter(t=>t.status==='未開始').length;
  // Big pct
  const tot = tasks.length?Math.round(tasks.reduce((s,t)=>s+t.pct,0)/tasks.length):0;
  document.getElementById('bigPct').innerHTML=`${tot}<em>%</em>`;
  // Cat bars
  const cats={};
  tasks.forEach(t=>{ if(!cats[t.cat]) cats[t.cat]={s:0,n:0}; cats[t.cat].s+=t.pct; cats[t.cat].n++; });
  document.getElementById('catBars').innerHTML=Object.entries(cats).map(([cat,v])=>{
    const pp=Math.round(v.s/v.n),c=catColor(cat);
    return `<div class="cat-row"><div class="cat-lbl">${cat}</div><div class="bar-track"><div class="bar-fill" style="width:${pp}%;background:${c}"></div></div><div class="cat-pct-n">${pp}%</div></div>`;
  }).join('');
  renderTable(tasks);
  renderGantt(tasks,p);
  renderPie(tasks);
}

function renderTable(tasks){
  const sorted=[...tasks].sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  document.getElementById('tblBody').innerHTML=sorted.map(t=>`
    <tr>
      <td><span class="chip" style="background:${catColor(t.cat)}18;color:${catColor(t.cat)};border:1px solid ${catColor(t.cat)}33">${t.cat||'—'}</span></td>
      <td style="font-weight:600">${t.name}</td>
      <td style="color:var(--text2)">${t.worker||'—'}</td>
      <td class="td-m">${t.start||'—'}</td>
      <td class="td-m">${t.end||'—'}</td>
      <td class="td-m">${t.est||'—'}</td>
      <td>${bdg(t.status)}</td>
      <td><div class="pbar"><div class="pbar-t"><div class="pbar-f" style="width:${t.pct}%;background:${pColor(t.pct)}"></div></div><div class="pbar-n">${t.pct}%</div></div></td>
    </tr>`).join('');
}

function renderGantt(tasks,p){
  const months=['2026/05','2026/06'];
  const gs=new Date('2026-05-01'),ge=new Date('2026-06-30');
  const today=new Date();
  function pos(ds){ if(!ds) return null; const d=new Date(ds); return Math.max(0,Math.min(100,(d-gs)/(ge-gs)*100)); }
  const tp=pos(today.toISOString().slice(0,10));
  const sorted=[...tasks].sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  let html=`<table class="g-tbl"><thead><tr>
    <th style="min-width:175px;width:175px">任務</th>
    <th style="min-width:76px">狀態</th>
    <th style="padding:0;min-width:460px"><div class="g-mhd">${months.map(m=>`<div class="g-mc">${m}</div>`).join('')}</div></th>
  </tr></thead><tbody>`;
  sorted.forEach(t=>{
    if(!t.start) return;
    const c=catColor(t.cat);
    const sp=pos(t.start),ep=t.end?pos(t.end):(sp!==null?Math.min(100,sp+(t.est||5)/61*100):null);
    const bL=sp!==null?sp:0,bW=ep!==null?Math.max(0.8,ep-bL):2;
    html+=`<tr>
      <td><div class="g-name" title="${t.name}">${t.name}</div><div class="g-cat">${t.cat}</div></td>
      <td>${bdg(t.status)}</td>
      <td style="padding:0;position:relative">
        <div class="g-row">
          <div class="g-bg">${months.map(()=>`<div class="g-bgc"></div>`).join('')}</div>
          ${tp!==null?`<div class="today-ln" style="left:${tp}%"></div>`:''}
          <div style="position:absolute;inset:0;z-index:1">
            <div class="g-bar" style="left:${bL}%;width:${bW}%;background:${c}20;border:1.5px solid ${c}55">
              <div class="g-bar-i" style="width:${t.pct}%;background:${c}cc"></div>
            </div>
          </div>
        </div>
      </td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('ganttWrap').innerHTML=html;
}

function drawPie(canvasId,legendId,segments){
  const canvas=document.getElementById(canvasId); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=Math.min(W,H)/2-16;
  ctx.clearRect(0,0,W,H);
  const total=segments.reduce((s,seg)=>s+seg.value,0); if(!total) return;
  let angle=-Math.PI/2;
  segments.forEach(seg=>{
    const slice=(seg.value/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,angle,angle+slice); ctx.closePath();
    ctx.fillStyle=seg.color; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    angle+=slice;
  });
  ctx.beginPath(); ctx.arc(cx,cy,r*0.52,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.fillStyle='#1a1f2e'; ctx.font='bold 20px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(total,cx,cy-7);
  ctx.font='11px Noto Sans TC,sans-serif'; ctx.fillStyle='#9399a8'; ctx.fillText('總計',cx,cy+11);
  document.getElementById(legendId).innerHTML=segments.map(seg=>{
    const pct=Math.round(seg.value/total*100);
    return `<div class="legend-row"><div class="legend-dot" style="background:${seg.color}"></div><div class="legend-lbl">${seg.label}</div><div class="legend-val">${seg.value}項 (${pct}%)</div></div>`;
  }).join('');
}

function renderPie(tasks){
  drawPie('pieStatus','legendStatus',[
    {label:'已完成',value:tasks.filter(t=>t.status==='已完成').length,color:'#16a34a'},
    {label:'進行中',value:tasks.filter(t=>t.status==='進行中').length,color:'#d97706'},
    {label:'未開始',value:tasks.filter(t=>t.status==='未開始').length,color:'#dc2626'},
  ].filter(s=>s.value>0));
  const cats={};
  tasks.forEach(t=>{ cats[t.cat]=(cats[t.cat]||0)+1; });
  drawPie('pieCat','legendCat',Object.entries(cats).map(([cat,n])=>({label:cat,value:n,color:catColor(cat)})));
  const catD={},catA={};
  tasks.forEach(t=>{ catA[t.cat]=(catA[t.cat]||0)+1; if(t.status==='已完成') catD[t.cat]=(catD[t.cat]||0)+1; });
  drawPie('pieProgress','legendProgress',
    Object.keys(catA).filter(c=>catD[c]).map(c=>({label:`${c}(${Math.round((catD[c]||0)/catA[c]*100)}%)`,value:catD[c]||0,color:catColor(c)}))
  );
}

// View toggle
window.setView=function(v){
  document.querySelectorAll('.vsec').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.view-btn').forEach((b,i)=>b.classList.toggle('active',['table','gantt','pie'][i]===v));
  if(v==='pie'&&currentData) renderPie(Object.values(currentData.tasks||{}));
};

// ── 下載進度報告（HTML → PDF 列印）────────────────────────────────────
window.downloadReport = function(){
  if(!currentData) return;
  const p = currentData;
  const tasks = Object.values(p.tasks||{}).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const now = new Date().toLocaleString('zh-TW');
  const total = tasks.length ? Math.round(tasks.reduce((s,t)=>s+t.pct,0)/tasks.length) : 0;
  const done  = tasks.filter(t=>t.status==='已完成').length;
  const doing = tasks.filter(t=>t.status==='進行中').length;
  const pend  = tasks.filter(t=>t.status==='未開始').length;

  const statusColor = s => s==='已完成'?'#16a34a':s==='進行中'?'#d97706':'#dc2626';
  const statusBg    = s => s==='已完成'?'#dcfce7':s==='進行中'?'#fef3c7':'#fee2e2';

  const html = `<!DOCTYPE html>
<html lang="zh-TW"><head>
<meta charset="UTF-8">
<title>${p.name||'工程進度報告'} - 進度報告</title>
<style>
  @page{size:A4;margin:20mm 15mm;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:12px;color:#1a1f2e;background:#fff;}
  .header{background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff;padding:24px 28px;border-radius:8px;margin-bottom:20px;}
  .header h1{font-size:22px;font-weight:900;margin-bottom:4px;}
  .header p{font-size:12px;opacity:.85;}
  .header-meta{display:flex;gap:20px;margin-top:12px;}
  .meta-item{background:rgba(255,255,255,.2);border-radius:6px;padding:6px 14px;font-size:11px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:#f4f6f9;border:1px solid #dde1e8;border-radius:8px;padding:12px;text-align:center;}
  .stat-val{font-size:28px;font-weight:900;font-family:monospace;}
  .stat-lbl{font-size:10px;color:#9399a8;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .s-total .stat-val{color:#2563eb;}
  .s-done  .stat-val{color:#16a34a;}
  .s-doing .stat-val{color:#d97706;}
  .s-pend  .stat-val{color:#dc2626;}
  .prog-section{background:#f4f6f9;border:1px solid #dde1e8;border-radius:8px;padding:16px;margin-bottom:20px;}
  .prog-title{font-size:13px;font-weight:700;margin-bottom:10px;}
  .prog-big{font-size:40px;font-weight:900;color:#2563eb;font-family:monospace;margin-bottom:10px;}
  .cat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .cat-lbl{width:120px;font-size:11px;color:#5a6175;flex-shrink:0;}
  .bar-bg{flex:1;height:8px;background:#e4e8ef;border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;}
  .cat-pct{width:32px;font-size:11px;color:#9399a8;font-family:monospace;text-align:right;}
  .table-section{margin-bottom:20px;}
  .table-title{font-size:13px;font-weight:700;margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th{background:#f0f2f5;padding:8px 10px;font-weight:700;color:#9399a8;text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:2px solid #dde1e8;}
  td{padding:8px 10px;border-bottom:1px solid #f0f2f5;vertical-align:middle;}
  tr:hover td{background:#f9fafc;}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
  .pbar-wrap{display:flex;align-items:center;gap:6px;}
  .pbar-bg{flex:1;height:5px;background:#e4e8ef;border-radius:3px;overflow:hidden;}
  .pbar-fill{height:100%;border-radius:3px;}
  .pbar-txt{font-size:10px;font-family:monospace;color:#9399a8;width:26px;}
  .footer{text-align:center;font-size:10px;color:#9399a8;margin-top:20px;padding-top:12px;border-top:1px solid #dde1e8;}
</style>
</head><body>
<div class="header">
  <h1>🏗 ${p.name||'工程進度報告'}</h1>
  <p>${p.desc||'工程進度管理系統'}</p>
  <div class="header-meta">
    <div class="meta-item">📅 報告日期：${now}</div>
    ${p.deadline?`<div class="meta-item">⚑ 完工期限：${p.deadline}</div>`:''}
    <div class="meta-item">📊 整體完成：${total}%</div>
  </div>
</div>

<div class="stats">
  <div class="stat s-total"><div class="stat-val">${tasks.length}</div><div class="stat-lbl">總任務數</div></div>
  <div class="stat s-done"> <div class="stat-val">${done}</div><div class="stat-lbl">已完成</div></div>
  <div class="stat s-doing"><div class="stat-val">${doing}</div><div class="stat-lbl">進行中</div></div>
  <div class="stat s-pend"> <div class="stat-val">${pend}</div><div class="stat-lbl">未開始</div></div>
</div>

<div class="prog-section">
  <div class="prog-title">📈 整體完成進度</div>
  <div class="prog-big">${total}%</div>
  ${(()=>{
    const cats={};
    tasks.forEach(t=>{ if(!cats[t.cat]) cats[t.cat]={s:0,n:0}; cats[t.cat].s+=t.pct; cats[t.cat].n++; });
    return Object.entries(cats).map(([cat,v])=>{
      const pp=Math.round(v.s/v.n);
      const colors={'水電工程':'#2563eb','冷凍藏庫':'#0891b2','設備':'#7c3aed','隔間':'#e05656','室內空調':'#0284c7','工廠申請登記':'#16a34a','人員訓練 軟體建置':'#c026d3'};
      const c=colors[cat]||'#64748b';
      return `<div class="cat-row"><div class="cat-lbl">${cat}</div><div class="bar-bg"><div class="bar-fill" style="width:${pp}%;background:${c}"></div></div><div class="cat-pct">${pp}%</div></div>`;
    }).join('');
  })()}
</div>

<div class="table-section">
  <div class="table-title">📋 任務明細</div>
  <table>
    <thead><tr><th>類別</th><th>任務名稱</th><th>協作人員</th><th>開始日期</th><th>完成日期</th><th>預估(日)</th><th>狀態</th><th>完成進度</th></tr></thead>
    <tbody>
      ${tasks.map(t=>{
        const pc=t.pct>=100?'#16a34a':t.pct>=50?'#2563eb':t.pct>0?'#d97706':'#e2e8f0';
        return `<tr>
          <td>${t.cat||'—'}</td>
          <td><strong>${t.name}</strong></td>
          <td>${t.worker||'—'}</td>
          <td style="font-family:monospace">${t.start||'—'}</td>
          <td style="font-family:monospace">${t.end||'—'}</td>
          <td style="font-family:monospace;text-align:center">${t.est||'—'}</td>
          <td><span class="badge" style="background:${statusBg(t.status)};color:${statusColor(t.status)}">${t.status}</span></td>
          <td><div class="pbar-wrap"><div class="pbar-bg"><div class="pbar-fill" style="width:${t.pct}%;background:${pc}"></div></div><div class="pbar-txt">${t.pct}%</div></div></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>
</div>

<div class="footer">本報告由聯采工程管理系統自動產生 · ${now} · 資料即時同步自 Firebase</div>
</body></html>`;

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `${p.name||'工程進度報告'}_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
  URL.revokeObjectURL(url);
};
</script>
</body>
</html>
