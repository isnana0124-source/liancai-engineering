<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程進度查詢｜廠商</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--bg2:#fff;--bg3:#f0f2f5;--bg4:#e4e8ef;--border:#dde1e8;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);--text:#1a1f2e;--text2:#5a6175;--text3:#9399a8;--blue:#2563eb;--blue-lt:#eff4ff;--blue-md:#dbeafe;--green:#16a34a;--green-md:#dcfce7;--yellow:#d97706;--yellow-md:#fef3c7;--red:#dc2626;--red-lt:#fff5f5;--red-md:#fee2e2;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
#loading{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spinner{width:40px;height:40px;border:3px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo h1{font-size:16px;font-weight:700;}
.logo p{font-size:11px;color:var(--text3);}
.hd-right{display:flex;align-items:center;gap:8px;}
.vendor-badge{background:var(--blue-lt);border:1px solid var(--blue-md);border-radius:20px;padding:4px 14px;font-size:13px;color:var(--blue);font-weight:700;}
.readonly-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text3);}
.dl-btn{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;box-shadow:0 2px 8px #2563eb30;transition:all .15s;}
.dl-btn:hover{background:#1d53d4;transform:translateY(-1px);}
.main{max-width:1200px;margin:0 auto;padding:24px;display:flex;flex-direction:column;gap:20px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.stat-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.1;}
.s-total .stat-icon{background:var(--blue-lt);}.s-total .stat-val{color:var(--blue);}
.s-done  .stat-icon{background:var(--green-md);}.s-done  .stat-val{color:var(--green);}
.s-doing .stat-icon{background:var(--yellow-md);}.s-doing .stat-val{color:var(--yellow);}
.s-pend  .stat-icon{background:var(--red-md);}.s-pend  .stat-val{color:var(--red);}
.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
.big-pct{font-size:54px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--blue);flex-shrink:0;line-height:1;}
.big-pct em{font-size:22px;font-weight:400;color:var(--text3);font-style:normal;}
.cat-bars{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px;}
.cat-row{display:flex;align-items:center;gap:10px;}
.cat-lbl{font-size:12px;color:var(--text2);width:130px;flex-shrink:0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.cat-pct-n{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;width:30px;text-align:right;}
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.section-hd{padding:16px 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.deadline-chip{background:var(--red-lt);border:1px solid #fca5a5;border-radius:20px;padding:3px 12px;font-size:12px;color:var(--red);font-weight:700;}
/* Cat Cards */
.cat-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:16px;}
.cat-prog-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .15s;}
.cat-prog-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.1);}
.cat-prog-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cat-prog-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.cat-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-prog-pct{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.cat-prog-bar-track{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;margin-bottom:10px;}
.cat-prog-bar-fill{height:100%;border-radius:5px;transition:width .6s ease;}
.cat-stats-row{display:flex;gap:8px;margin-bottom:10px;}
.cat-stat-chip{flex:1;text-align:center;background:var(--bg2);border-radius:6px;padding:5px 4px;}
.cat-stat-chip-val{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.cat-stat-chip-lbl{font-size:10px;color:var(--text3);}
.cat-task-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;}
.cat-task-list::-webkit-scrollbar{width:3px;}
.cat-task-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.cat-task-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg2);border-radius:6px;font-size:12px;}
.cat-task-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-pbar{width:46px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0;}
.mini-pbar-fill{height:100%;border-radius:2px;}
.mini-pct-txt{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);width:24px;text-align:right;}
/* View toggle */
.view-toggle{display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;font-family:'Noto Sans TC',sans-serif;}
.view-btn:hover{background:var(--bg2);}
.view-btn.active{background:var(--bg2);color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.vsec{display:none;}.vsec.active{display:block;}
/* Table */
table{width:100%;border-collapse:collapse;}
thead th{background:var(--bg3);padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--bg3);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:10px 14px;font-size:13px;vertical-align:middle;}
.td-m{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.bd{width:5px;height:5px;border-radius:50%;background:currentColor;}
.b-done{background:var(--green-md);color:var(--green);}
.b-doing{background:var(--yellow-md);color:var(--yellow);}
.b-pend{background:var(--red-md);color:var(--red);}
.pbar{display:flex;align-items:center;gap:8px;min-width:100px;}
.pbar-t{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.pbar-f{height:100%;border-radius:3px;}
.pbar-n{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3);width:28px;}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
/* Gantt */
.gantt-scroll{overflow-x:auto;}
.g-tbl{border-collapse:collapse;min-width:700px;width:100%;}
.g-tbl th{background:var(--bg3);font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;padding:8px 12px;white-space:nowrap;border-bottom:1px solid var(--border);text-align:left;}
.g-tbl td{padding:6px 10px;border-bottom:1px solid var(--bg3);vertical-align:middle;}
.g-tbl tr:hover td{background:var(--bg3);}
.g-name{font-size:12px;font-weight:600;max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-cat{font-size:10px;color:var(--text3);}
.g-mhd{display:flex;height:26px;background:var(--bg3);border-bottom:1px solid var(--border);}
.g-mc{flex:1;text-align:center;font-size:10px;color:var(--text3);font-weight:700;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);}
.g-row{position:relative;min-width:460px;height:28px;}
.g-bg{position:absolute;inset:0;display:flex;}
.g-bgc{flex:1;border-right:1px solid var(--bg4);}
.g-bar{position:absolute;height:16px;top:50%;transform:translateY(-50%);border-radius:5px;overflow:hidden;min-width:4px;}
.g-bar-i{height:100%;border-radius:5px;}
.today-ln{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:10;opacity:.55;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.footer-note{text-align:center;font-size:12px;color:var(--text3);padding:16px;}
@media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr}.prog-card{flex-direction:column}.cat-cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>載入工程進度中…</p></div>
<header>
  <div class="logo">
    <div class="logo-icon">🏗</div>
    <div><h1 id="headerTitle">工程進度查詢</h1><p id="headerSub">廠商進度檢視</p></div>
  </div>
  <div class="hd-right">
    <span class="vendor-badge" id="vendorBadge">🏢 廠商</span>
    <span class="readonly-badge">👁 唯讀</span>
    <button class="dl-btn" onclick="downloadReport()">⬇ 下載進度報告</button>
  </div>
</header>
<div class="main">
  <div id="errorMsg" style="display:none;background:var(--red-lt);border:1px solid #fca5a5;border-radius:12px;padding:16px 20px;color:var(--red);font-weight:600;text-align:center;"></div>
  <div class="stats-row">
    <div class="stat-card s-total"><div class="stat-icon">📋</div><div><div class="stat-lbl">我的任務</div><div class="stat-val" id="s-total">0</div></div></div>
    <div class="stat-card s-done"><div class="stat-icon">✅</div><div><div class="stat-lbl">已完成</div><div class="stat-val" id="s-done">0</div></div></div>
    <div class="stat-card s-doing"><div class="stat-icon">⚙️</div><div><div class="stat-lbl">進行中</div><div class="stat-val" id="s-doing">0</div></div></div>
    <div class="stat-card s-pend"><div class="stat-icon">⏳</div><div><div class="stat-lbl">未開始</div><div class="stat-val" id="s-pend">0</div></div></div>
  </div>
  <div class="prog-card">
    <div class="big-pct" id="bigPct">0<em>%</em></div>
    <div class="cat-bars" id="catBars"></div>
  </div>
  <div class="section-card">
    <div class="section-hd">
      <span>📊 各類工程進度報表</span>
      <span class="deadline-chip" id="deadlineChip"></span>
    </div>
    <div class="cat-cards-grid" id="catCards"></div>
  </div>
  <div class="section-card">
    <div class="section-hd">
      <div style="display:flex;align-items:center;gap:12px;">
        <span>📋 任務明細</span>
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('table')">列表</button>
          <button class="view-btn" onclick="setView('gantt')">甘特圖</button>
        </div>
      </div>
    </div>
    <div id="view-table" class="vsec active">
      <table><thead><tr><th>類別</th><th>任務名稱</th><th>開始日期</th><th>完成日期</th><th>預估(日)</th><th>狀態</th><th>進度</th></tr></thead>
      <tbody id="tblBody"></tbody></table>
    </div>
    <div id="view-gantt" class="vsec">
      <div class="gantt-scroll" id="ganttWrap"></div>
    </div>
  </div>
  <div class="footer-note"><span class="sync-dot"></span>即時同步中・資料由管理者更新・最後更新：<span id="lastUpdate">—</span></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db=getFirestore(initializeApp({apiKey:"AIzaSyAVI40syAU_DrKpHK8VinCTJjSNNQ577_Y",authDomain:"lian-cai.firebaseapp.com",projectId:"lian-cai",storageBucket:"lian-cai.firebasestorage.app",messagingSenderId:"85226153774",appId:"1:85226153774:web:5db8f25cfee2536817bcbf"}));
const COLORS={'水電工程':'#2563eb','冷凍藏庫':'#0891b2','設備':'#7c3aed','隔間':'#e05656','室內空調':'#0284c7','工廠申請登記':'#16a34a','人員訓練 軟體建置':'#c026d3','其他':'#64748b'};
const PAL=['#2563eb','#0891b2','#7c3aed','#e05656','#16a34a','#d97706','#c026d3','#059669'];
const cc=c=>COLORS[c]||(PAL[Math.abs([...c||'x'].reduce((s,ch)=>s+ch.charCodeAt(0),0))%PAL.length]);
const pc=p=>p>=100?'var(--green)':p>=50?'var(--blue)':p>0?'var(--yellow)':'#e2e8f0';
const bdg=s=>s==='已完成'?`<span class="badge b-done"><span class="bd"></span>${s}</span>`:s==='進行中'?`<span class="badge b-doing"><span class="bd"></span>${s}</span>`:`<span class="badge b-pend"><span class="bd"></span>${s}</span>`;
const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const projId=params.get('project'), vendor=params.get('vendor');
let currentData=null;
if(!projId||!vendor){$('loading').style.display='none';$('errorMsg').style.display='block';$('errorMsg').textContent='連結無效，請聯絡管理者取得正確連結。';}
else{
  $('vendorBadge').textContent='🏢 '+vendor;
  onSnapshot(doc(db,'projects',projId),snap=>{
    $('loading').style.display='none';
    if(!snap.exists()){$('errorMsg').style.display='block';$('errorMsg').textContent='找不到此專案，請聯絡管理者。';return;}
    const p=snap.data(); currentData=p;
    $('headerTitle').textContent=p.name||'工程進度';
    $('headerSub').textContent=p.desc||'廠商進度檢視';
    $('deadlineChip').textContent=p.deadline?`⚑ 期限 ${p.deadline}`:'';
    $('lastUpdate').textContent=new Date().toLocaleString('zh-TW');
    const all=Object.values(p.tasks||{}).filter(t=>t&&typeof t==='object');
    const mine=all.filter(t=>(t.worker||'').includes(vendor)||(t.cat||'').includes(vendor));
    const tasks=mine.length?mine:all;
    // Stats
    $('s-total').textContent=tasks.length;
    $('s-done').textContent=tasks.filter(t=>t.status==='已完成').length;
    $('s-doing').textContent=tasks.filter(t=>t.status==='進行中').length;
    $('s-pend').textContent=tasks.filter(t=>t.status==='未開始').length;
    // Overall
    const tot=tasks.length?Math.round(tasks.reduce((s,t)=>s+(t.pct||0),0)/tasks.length):0;
    $('bigPct').innerHTML=`${tot}<em>%</em>`;
    const cats={};
    tasks.forEach(t=>{if(!cats[t.cat])cats[t.cat]={s:0,n:0};cats[t.cat].s+=(t.pct||0);cats[t.cat].n++;});
    $('catBars').innerHTML=Object.entries(cats).map(([cat,v])=>{const pp=Math.round(v.s/v.n),c=cc(cat);return `<div class="cat-row"><div class="cat-lbl" title="${cat}">${cat}</div><div class="bar-track"><div class="bar-fill" style="width:${pp}%;background:${c}"></div></div><div class="cat-pct-n">${pp}%</div></div>`;}).join('');
    // Cat Cards
    const catMap={};
    tasks.forEach(t=>{if(!catMap[t.cat])catMap[t.cat]={tasks:[],done:0,doing:0,pend:0,totalPct:0};const c=catMap[t.cat];c.tasks.push(t);c.totalPct+=(t.pct||0);if(t.status==='已完成')c.done++;else if(t.status==='進行中')c.doing++;else c.pend++;});
    $('catCards').innerHTML=Object.entries(catMap).map(([cat,v])=>{
      const pct=Math.round(v.totalPct/v.tasks.length),col=cc(cat);
      const sorted=[...v.tasks].sort((a,b)=>(a.start||'').localeCompare(b.start||''));
      return `<div class="cat-prog-card">
        <div class="cat-prog-hd"><div class="cat-prog-name"><div class="cat-color-dot" style="background:${col}"></div>${cat}</div><div class="cat-prog-pct" style="color:${col}">${pct}%</div></div>
        <div class="cat-prog-bar-track"><div class="cat-prog-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="cat-stats-row">
          <div class="cat-stat-chip"><div class="cat-stat-chip-val" style="color:var(--green)">${v.done}</div><div class="cat-stat-chip-lbl">已完成</div></div>
          <div class="cat-stat-chip"><div class="cat-stat-chip-val" style="color:var(--yellow)">${v.doing}</div><div class="cat-stat-chip-lbl">進行中</div></div>
          <div class="cat-stat-chip"><div class="cat-stat-chip-val" style="color:var(--red)">${v.pend}</div><div class="cat-stat-chip-lbl">未開始</div></div>
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">任務清單</div>
        <div class="cat-task-list">${sorted.map(t=>`
          <div class="cat-task-item">
            <div class="cat-task-name" title="${t.name}">${t.name}</div>
            <div class="mini-pbar"><div class="mini-pbar-fill" style="width:${t.pct||0}%;background:${pc(t.pct||0)}"></div></div>
            <div class="mini-pct-txt">${t.pct||0}%</div>
            ${bdg(t.status)}
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
    // Table
    const sorted=[...tasks].sort((a,b)=>(a.start||'9999').localeCompare(b.start||'9999'));
    $('tblBody').innerHTML=sorted.map(t=>`<tr>
      <td><span class="chip" style="background:${cc(t.cat)}18;color:${cc(t.cat)};border:1px solid ${cc(t.cat)}33">${t.cat||'—'}</span></td>
      <td style="font-weight:600">${t.name}</td>
      <td class="td-m">${t.start||'—'}</td><td class="td-m">${t.end||'—'}</td><td class="td-m">${t.est||'—'}</td>
      <td>${bdg(t.status)}</td>
      <td><div class="pbar"><div class="pbar-t"><div class="pbar-f" style="width:${t.pct||0}%;background:${pc(t.pct||0)}"></div></div><div class="pbar-n">${t.pct||0}%</div></div></td>
    </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text3)">尚無任務</td></tr>';
    // Gantt
    const months=['2026/05','2026/06'],gs=new Date('2026-05-01'),ge=new Date('2026-06-30'),today=new Date();
    const pos=ds=>{if(!ds)return null;const d=new Date(ds);return Math.max(0,Math.min(100,(d-gs)/(ge-gs)*100));};
    const tp=pos(today.toISOString().slice(0,10));
    let gh=`<table class="g-tbl"><thead><tr><th style="min-width:175px;width:175px">任務</th><th style="min-width:76px">狀態</th><th style="padding:0;min-width:460px"><div class="g-mhd">${months.map(m=>`<div class="g-mc">${m}</div>`).join('')}</div></th></tr></thead><tbody>`;
    sorted.filter(t=>t.start).forEach(t=>{
      const c=cc(t.cat),sp=pos(t.start),ep=t.end?pos(t.end):(sp!==null?Math.min(100,sp+(t.est||5)/61*100):null);
      const bL=sp!==null?sp:0,bW=ep!==null?Math.max(0.8,ep-bL):2;
      gh+=`<tr><td><div class="g-name" title="${t.name}">${t.name}</div><div class="g-cat">${t.cat}</div></td><td>${bdg(t.status)}</td>
        <td style="padding:0;position:relative"><div class="g-row"><div class="g-bg">${months.map(()=>'<div class="g-bgc"></div>').join('')}</div>${tp!==null?`<div class="today-ln" style="left:${tp}%"></div>`:''}<div style="position:absolute;inset:0;z-index:1"><div class="g-bar" style="left:${bL}%;width:${bW}%;background:${c}20;border:1.5px solid ${c}55"><div class="g-bar-i" style="width:${t.pct||0}%;background:${c}cc"></div></div></div></div></td></tr>`;
    });
    $('ganttWrap').innerHTML=gh+'</tbody></table>';
  },err=>{$('loading').style.display='none';$('errorMsg').style.display='block';$('errorMsg').textContent='無法載入資料，請稍後再試。';});
}
window.setView=v=>{
  document.querySelectorAll('.vsec').forEach(el=>el.classList.remove('active'));
  $('view-'+v).classList.add('active');
  document.querySelectorAll('.view-btn').forEach((b,i)=>b.classList.toggle('active',['table','gantt'][i]===v));
};
window.downloadReport=()=>{

  const p=currentData;
  const all=Object.values(p.tasks||{}).filter(t=>t&&typeof t==='object');
  const mine=all.filter(t=>(t.worker||'').includes(vendor)||(t.cat||'').includes(vendor));

  const html=`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>${vendor} 進度報告</title>

.prog{background:#f4f6f9;border:1px solid #dde1e8;border-radius:8px;padding:14px;margin-bottom:14px;}.pb{font-size:34px;font-weight:900;color:#2563eb;font-family:monospace;margin-bottom:8px;}.cr{display:flex;align-items:center;gap:8px;margin-bottom:5px;}.cl{width:110px;font-size:10px;color:#5a6175;flex-shrink:0;}.cb{flex:1;height:7px;background:#e4e8ef;border-radius:4px;overflow:hidden;}.cbf{height:100%;border-radius:4px;}.cp{width:28px;font-size:10px;font-family:monospace;color:#9399a8;text-align:right;}
.cats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}.cc{border:1px solid #dde1e8;border-radius:8px;padding:12px;break-inside:avoid;}.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}.cn{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}.cdot{width:8px;height:8px;border-radius:50%;}.cpct{font-size:18px;font-weight:900;font-family:monospace;}.cbar{height:8px;background:#e4e8ef;border-radius:4px;overflow:hidden;margin-bottom:8px;}.cbarf{height:100%;border-radius:4px;}.cs{display:flex;gap:6px;margin-bottom:8px;}.csc{flex:1;background:#f4f6f9;border-radius:5px;padding:4px;text-align:center;}.cscv{font-size:14px;font-weight:700;font-family:monospace;}.cscl{font-size:9px;color:#9399a8;}

.tbl{margin-bottom:14px;}.tt{font-size:12px;font-weight:700;margin-bottom:8px;}table{width:100%;border-collapse:collapse;}th{background:#f0f2f5;padding:6px 8px;font-size:9px;font-weight:700;color:#9399a8;text-transform:uppercase;text-align:left;border-bottom:2px solid #dde1e8;}td{padding:6px 8px;border-bottom:1px solid #f0f2f5;font-size:10px;}.pb2{display:flex;align-items:center;gap:5px;}.pb2bg{flex:1;height:4px;background:#e4e8ef;border-radius:2px;overflow:hidden;}.pb2f{height:100%;border-radius:2px;}

<div class="cats">${Object.entries(catMap).map(([cat,v])=>{const pp=Math.round(v.tp/v.tasks.length),c=getC(cat);return `<div class="cc"><div class="ch"><div class="cn"><div class="cdot" style="background:${c}"></div>${cat}</div><div class="cpct" style="color:${c}">${pp}%</div></div><div class="cbar"><div class="cbarf" style="width:${pp}%;background:${c}"></div></div><div class="cs"><div class="csc"><div class="cscv" style="color:#16a34a">${v.done}</div><div class="cscl">已完成</div></div><div class="csc"><div class="cscv" style="color:#d97706">${v.doing}</div><div class="cscl">進行中</div></div><div class="csc"><div class="cscv" style="color:#dc2626">${v.pend}</div><div class="cscl">未開始</div></div></div><div class="tl">${v.tasks.sort((a,b)=>(a.start||'').localeCompare(b.start||'')).map(t=>`<div class="ti"><div class="tn" title="${t.name}">${t.name}</div><div class="tbg"><div class="tbgf" style="width:${t.pct||0}%;background:${t.pct>=100?'#16a34a':t.pct>0?'#2563eb':'#e2e8f0'}"></div></div><div class="tp">${t.pct||0}%</div><span class="tb" style="background:${sBg(t.status)};color:${sFg(t.status)}">${t.status}</span></div>`).join('')}</div></div>`;}).join('')}</div>
